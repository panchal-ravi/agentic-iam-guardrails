deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: 2024-04-01
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: filesystem

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 10Gi
    storageClass: gp2

backend:
  replicas: 0

chunksCache:
  enabled: false

lokiCanary:
  enabled: false

test:
  enabled: false

read:
  replicas: 0

resultsCache:
  enabled: false

write:
  replicas: 0
