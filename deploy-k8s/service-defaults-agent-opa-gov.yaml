apiVersion: consul.hashicorp.com/v1alpha1
kind: ServiceDefaults
metadata:
  name: ai-agent
  namespace: default
spec:
  protocol: http
  envoyExtensions:
  - name: "builtin/lua" # has to be this so it can be recognized by envoy
    arguments:
      proxyType: "connect-proxy"
      listener: "inbound"
      script: |-
        -- ==========================================================
        -- Thin Lua filter: delegates policy + masking to opa-gov-api.
        -- All base64 encoding, JSON parsing, and OPA-call wiring is
        -- handled inside the opa-gov-api service. This filter only:
        --   - forwards the request body to /evaluate and checks the
        --     HTTP status code (400 = block, anything else = allow)
        --   - forwards the response body to /mask and replaces the
        --     outbound body with whatever opa-gov-api returns
        -- ==========================================================

        local OPA_GOV_TIMEOUT_MS = 5000
        local OPA_GOV_PATH_EVALUATE = "/evaluate"
        local OPA_GOV_PATH_MASK = "/mask"
        local BLOCKED_MESSAGE = "This content was blocked due to security policy violation"

        -- ==========================================================
        -- Structured JSON logging helpers (match Python log schema):
        -- {host_name, host_ip, module, function, line, process_id,
        --  thread_name, request_id, event, message, ...}
        -- ==========================================================
        local LOG_MODULE = "envoy_lua_opa_gov_filter"

        local function _safe_getenv(name)
          local ok, value = pcall(os.getenv, name)
          if ok and value and value ~= "" then return value end
          return nil
        end

        local HOST_NAME = _safe_getenv("HOSTNAME") or "-"
        local HOST_IP = _safe_getenv("HOST_IP") or "-"

        local function _json_escape(s)
          s = tostring(s)
          s = string.gsub(s, "\\", "\\\\")
          s = string.gsub(s, '"', '\\"')
          s = string.gsub(s, "\n", "\\n")
          s = string.gsub(s, "\r", "\\r")
          s = string.gsub(s, "\t", "\\t")
          return s
        end

        local function _json_value(v)
          if v == nil then return "null" end
          local t = type(v)
          if t == "number" or t == "boolean" then return tostring(v) end
          return '"' .. _json_escape(v) .. '"'
        end

        local function _json_encode_ordered(pairs_list)
          local parts = {}
          for i = 1, #pairs_list do
            local kv = pairs_list[i]
            parts[#parts + 1] = '"' .. _json_escape(kv[1]) .. '":' .. _json_value(kv[2])
          end
          return "{" .. table.concat(parts, ",") .. "}"
        end

        local function _resolve_request_id(handle)
          local headers = handle:headers()
          local rid = headers:get("x-request-id") or headers:get("X-Request-ID")
          if rid and rid ~= "" then return rid end
          local ok, sid = pcall(function() return handle:streamInfo():requestID() end)
          if ok and sid and sid ~= "" then return sid end
          return "-"
        end

        local function log_event(handle, level, func_name, event, message, extra)
          local fields = {
            {"host_name", HOST_NAME},
            {"host_ip", HOST_IP},
            {"module", LOG_MODULE},
            {"function", func_name or "-"},
            {"line", 0},
            {"process_id", 0},
            {"thread_name", "envoy-worker"},
            {"request_id", _resolve_request_id(handle)},
            {"event", event},
            {"message", message},
          }
          if extra then
            for i = 1, #extra do fields[#fields + 1] = extra[i] end
          end
          local payload = _json_encode_ordered(fields)
          if level == "warn" then handle:logWarn(payload)
          elseif level == "err" or level == "error" then handle:logErr(payload)
          elseif level == "debug" then handle:logDebug(payload)
          else handle:logInfo(payload) end
        end

        -- Resolve the Consul FQDN for opa-gov-api from dynamic metadata.
        -- Returns nil if the sidecar has not populated the consul namespace.
        local function resolve_opa_gov_service(handle)
          local md = handle:streamInfo():dynamicMetadata()
          if not md then return nil end
          local consul_ns = md:get("consul")
          if not consul_ns or type(consul_ns) ~= "table" then return nil end
          local trust_domain = consul_ns["trust-domain"]
          local datacenter = consul_ns["datacenter"]
          if not trust_domain or not datacenter then return nil end
          return "opa-gov-api.default." .. datacenter .. ".internal." .. trust_domain
        end

        -- POST body_str to opa-gov-api at the given path. Returns
        -- (response_headers, response_body) or (nil, nil) on transport failure.
        local function call_opa_gov(handle, opa_gov_service, path, body_str)
          local request_id = handle:headers():get("x-request-id")
            or handle:headers():get("X-Request-ID")
            or handle:streamInfo():requestID()
          local headers = {
            [":method"] = "POST",
            [":path"] = path,
            [":authority"] = opa_gov_service,
            ["content-type"] = "text/plain",
            ["x-request-id"] = request_id,
          }
          return handle:httpCall(
            opa_gov_service, headers, body_str or "", OPA_GOV_TIMEOUT_MS
          )
        end

        -- ==========================================================
        -- Request path: enforce inbound security policy via opa-gov-api.
        -- ==========================================================
        function envoy_on_request(request_handle)
          log_event(request_handle, "info", "envoy_on_request",
            "envoy.request.inbound", "Inbound request received")

          local opa_gov_service = resolve_opa_gov_service(request_handle)
          if not opa_gov_service then
            log_event(request_handle, "warn", "envoy_on_request",
              "opa_gov.consul.metadata.missing",
              "Missing Consul metadata; skipping opa-gov-api /evaluate")
            return
          end
          log_event(request_handle, "info", "envoy_on_request",
            "opa_gov.service.resolved",
            "Resolved opa-gov-api upstream service",
            {{"opa_gov_service", opa_gov_service}})

          local body = request_handle:body(true)
          if not body or body:length() == 0 then
            log_event(request_handle, "info", "envoy_on_request",
              "envoy.request.body.empty",
              "Inbound request body is empty; skipping /evaluate")
            return
          end
          local body_str = body:getBytes(0, body:length())

          local response_headers, response_body = call_opa_gov(
            request_handle, opa_gov_service, OPA_GOV_PATH_EVALUATE, body_str
          )
          if not response_headers then
            log_event(request_handle, "warn", "envoy_on_request",
              "opa_gov.evaluate.unreachable",
              "opa-gov-api unreachable on /evaluate; fail-open")
            return
          end

          local status = tonumber(response_headers[":status"])
          log_event(request_handle, "info", "envoy_on_request",
            "opa_gov.evaluate.response",
            "opa-gov-api /evaluate response received",
            {{"status_code", status}})
          if status == 400 then
            log_event(request_handle, "info", "envoy_on_request",
              "opa_gov.evaluate.blocked",
              "Request blocked by opa-gov-api /evaluate",
              {{"status_code", status},
               {"body_preview", string.sub(body_str, 1, 100)}})
            request_handle:respond(
              {[":status"] = "400", ["content-type"] = "text/plain"},
              response_body or BLOCKED_MESSAGE
            )
            return
          end
        end

        -- ==========================================================
        -- Response path: mask outbound payload via opa-gov-api (200 only).
        -- ==========================================================
        function envoy_on_response(response_handle)
          log_event(response_handle, "info", "envoy_on_response",
            "envoy.response.outbound", "Outbound response received")

          local status_code = tonumber(response_handle:headers():get(":status"))
          log_event(response_handle, "info", "envoy_on_response",
            "envoy.response.status",
            "Outbound response status resolved",
            {{"status_code", status_code}})
          if not status_code or status_code ~= 200 then
            log_event(response_handle, "info", "envoy_on_response",
              "opa_gov.mask.skip",
              "Skipping opa-gov-api /mask for non-200 response",
              {{"status_code", status_code}})
            return
          end

          local body = response_handle:body(true)
          if not body or body:length() == 0 then
            log_event(response_handle, "info", "envoy_on_response",
              "envoy.response.body.empty",
              "Outbound response body is empty; skipping /mask")
            return
          end

          local opa_gov_service = resolve_opa_gov_service(response_handle)
          if not opa_gov_service then
            log_event(response_handle, "warn", "envoy_on_response",
              "opa_gov.consul.metadata.missing",
              "Missing Consul metadata; skipping opa-gov-api /mask")
            return
          end

          local body_str = body:getBytes(0, body:length())
          local response_headers, response_body = call_opa_gov(
            response_handle, opa_gov_service, OPA_GOV_PATH_MASK, body_str
          )
          if not response_headers or not response_body then
            log_event(response_handle, "warn", "envoy_on_response",
              "opa_gov.mask.unreachable",
              "opa-gov-api unreachable on /mask; passing body through")
            return
          end

          response_handle:body():setBytes(response_body)
          response_handle:headers():replace(
            "content-length", tostring(response_handle:body():length())
          )
          local gov_ct = response_headers["content-type"]
          if gov_ct then
            response_handle:headers():replace("content-type", gov_ct)
          end
        end
