<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Colors — Status & accents</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;}
  .card{padding:20px 24px;font-family:var(--cds-font-sans);}
  .row{display:flex;gap:0;margin-bottom:14px;}
  .row:last-child{margin-bottom:0;}
  .lbl{width:72px;font-family:var(--cds-font-mono);font-size:11px;color:var(--cds-text-secondary);padding-top:2px;}
  .swatches{display:flex;flex:1;gap:2px;}
  .sw{flex:1;height:44px;display:flex;align-items:flex-end;padding:4px 6px;font-family:var(--cds-font-mono);font-size:9px;}
  .sw.dark{color:#fff;} .sw.light{color:#161616;}
  .sw span{opacity:.85;}
</style>
</head>
<body>
<div class="card">
  <div class="row"><div class="lbl">Green</div><div class="swatches">
    <div class="sw light" style="background:#defbe6"><span>10</span></div>
    <div class="sw light" style="background:#a7f0ba"><span>20</span></div>
    <div class="sw light" style="background:#6fdc8c"><span>30</span></div>
    <div class="sw dark" style="background:#42be65"><span>40</span></div>
    <div class="sw dark" style="background:#24a148"><span>50</span></div>
    <div class="sw dark" style="background:#198038"><span>60</span></div>
    <div class="sw dark" style="background:#0e6027"><span>70</span></div>
    <div class="sw dark" style="background:#044317"><span>80</span></div>
  </div></div>
  <div class="row"><div class="lbl">Yellow</div><div class="swatches">
    <div class="sw light" style="background:#fcf4d6"><span>10</span></div>
    <div class="sw light" style="background:#fddc69"><span>20</span></div>
    <div class="sw light" style="background:#f1c21b"><span>30</span></div>
    <div class="sw dark" style="background:#d2a106"><span>40</span></div>
    <div class="sw dark" style="background:#b28600"><span>50</span></div>
    <div class="sw dark" style="background:#8e6a00"><span>60</span></div>
    <div class="sw dark" style="background:#684e00"><span>70</span></div>
    <div class="sw dark" style="background:#483700"><span>80</span></div>
  </div></div>
  <div class="row"><div class="lbl">Teal</div><div class="swatches">
    <div class="sw dark" style="background:#009d9a"><span>50</span></div>
    <div class="sw dark" style="background:#007d79"><span>60</span></div>
    <div class="sw dark" style="background:#005d5d"><span>70</span></div>
  </div></div>
  <div class="row"><div class="lbl">Purple</div><div class="swatches">
    <div class="sw dark" style="background:#8a3ffc"><span>50</span></div>
    <div class="sw dark" style="background:#6929c4"><span>60</span></div>
    <div class="sw dark" style="background:#491d8b"><span>70</span></div>
  </div></div>
  <div class="row"><div class="lbl">Magenta</div><div class="swatches">
    <div class="sw dark" style="background:#ee5396"><span>50</span></div>
    <div class="sw dark" style="background:#d02670"><span>60</span></div>
  </div></div>
  <div class="row"><div class="lbl">Cyan</div><div class="swatches">
    <div class="sw dark" style="background:#1192e8"><span>50</span></div>
    <div class="sw dark" style="background:#0072c3"><span>60</span></div>
  </div></div>
</div>
</body>
</html>
