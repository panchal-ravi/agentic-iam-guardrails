<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type — Productive scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;}
  .card{padding:20px 28px;font-family:var(--cds-font-sans);color:#161616;}
  .row{display:grid;grid-template-columns:120px 1fr;gap:16px;align-items:baseline;padding:6px 0;border-bottom:1px solid #f4f4f4;}
  .row:last-child{border-bottom:none;}
  .meta{font-family:var(--cds-font-mono);font-size:11px;color:#6f6f6f;}
  .spec{color:#161616;}
</style>
</head>
<body>
<div class="card">
  <div class="row"><div class="meta">heading-07<br><span style="color:#a8a8a8">54 / 64 · 300</span></div><div class="spec" style="font-size:54px;line-height:64px;font-weight:300;letter-spacing:0;">Hello Carbon</div></div>
  <div class="row"><div class="meta">heading-06<br><span style="color:#a8a8a8">42 / 50 · 300</span></div><div class="spec" style="font-size:42px;line-height:50px;font-weight:300;">Hello Carbon</div></div>
  <div class="row"><div class="meta">heading-05<br><span style="color:#a8a8a8">32 / 40 · 400</span></div><div class="spec" style="font-size:32px;line-height:40px;font-weight:400;">Hello Carbon</div></div>
  <div class="row"><div class="meta">heading-04<br><span style="color:#a8a8a8">28 / 36 · 400</span></div><div class="spec" style="font-size:28px;line-height:36px;">Hello Carbon</div></div>
  <div class="row"><div class="meta">heading-03<br><span style="color:#a8a8a8">20 / 28 · 400</span></div><div class="spec" style="font-size:20px;line-height:28px;">Hello Carbon</div></div>
  <div class="row"><div class="meta">heading-02<br><span style="color:#a8a8a8">16 / 24 · 600</span></div><div class="spec" style="font-size:16px;line-height:24px;font-weight:600;">Hello Carbon</div></div>
  <div class="row"><div class="meta">heading-01<br><span style="color:#a8a8a8">14 / 20 · 600</span></div><div class="spec" style="font-size:14px;line-height:20px;font-weight:600;letter-spacing:.16px;">Hello Carbon</div></div>
</div>
</body>
</html>
