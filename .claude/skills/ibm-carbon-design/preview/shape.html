<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Shape & radius</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;color:#161616;font-family:var(--cds-font-sans);}
  .card{padding:24px 28px;}
  .row{display:flex;gap:24px;align-items:flex-end;}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .sq{width:72px;height:72px;background:#0f62fe;}
  .lbl{font-family:var(--cds-font-mono);font-size:11px;color:#525252;}
  .val{font-family:var(--cds-font-mono);font-size:11px;color:#a8a8a8;}
  .note{margin-top:18px;font-size:12px;color:#525252;max-width:600px;line-height:18px;}
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="item"><div class="sq" style="border-radius:0"></div><div class="lbl">none</div><div class="val">0</div></div>
    <div class="item"><div class="sq" style="border-radius:2px"></div><div class="lbl">xs</div><div class="val">2px</div></div>
    <div class="item"><div class="sq" style="border-radius:4px"></div><div class="lbl">sm</div><div class="val">4px</div></div>
    <div class="item"><div class="sq" style="border-radius:6px"></div><div class="lbl">md</div><div class="val">6px</div></div>
    <div class="item"><div class="sq" style="border-radius:8px"></div><div class="lbl">lg</div><div class="val">8px</div></div>
    <div class="item"><div class="sq" style="border-radius:999px"></div><div class="lbl">pill</div><div class="val">AI / Tag</div></div>
  </div>
  <div class="note">Carbon defaults to <strong>0 radius</strong>. Radius appears only on AI-adjacent components (AI Label, chat bubble) and on Tags (pill).</div>
</div>
</body>
</html>
