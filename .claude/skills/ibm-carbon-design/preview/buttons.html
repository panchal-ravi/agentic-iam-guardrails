<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;color:#161616;font-family:var(--cds-font-sans);}
  .card{padding:20px 24px;display:flex;flex-direction:column;gap:12px;}
  .row{display:flex;gap:1px;align-items:center;}
  .row-lbl{width:80px;font-family:var(--cds-font-mono);font-size:11px;color:#525252;}
  .btn{height:48px;padding:0 64px 0 16px;font-family:var(--cds-font-sans);font-size:14px;line-height:18px;letter-spacing:.16px;border:0;cursor:pointer;display:inline-flex;align-items:center;gap:8px;position:relative;font-weight:400;}
  .primary{background:#0f62fe;color:#fff;}
  .primary:hover{background:#0050e6;}
  .secondary{background:#393939;color:#fff;}
  .tertiary{background:transparent;color:#0f62fe;border:1px solid #0f62fe;}
  .ghost{background:transparent;color:#0f62fe;}
  .danger{background:#da1e28;color:#fff;}
  .arr{margin-left:auto;width:16px;height:16px;background:currentColor;mask:url(../assets/icons/arrow--right.svg) center/16px no-repeat;-webkit-mask:url(../assets/icons/arrow--right.svg) center/16px no-repeat;}
  .focus-ring{outline:2px solid #0f62fe;outline-offset:-3px;box-shadow:inset 0 0 0 1px #fff;}
</style>
</head>
<body>
<div class="card">
  <div class="row"><div class="row-lbl">Primary</div><button class="btn primary">Create resource <span class="arr"></span></button></div>
  <div class="row"><div class="row-lbl">Secondary</div><button class="btn secondary">Save changes <span class="arr"></span></button></div>
  <div class="row"><div class="row-lbl">Tertiary</div><button class="btn tertiary">View all <span class="arr"></span></button></div>
  <div class="row"><div class="row-lbl">Danger</div><button class="btn danger">Delete <span class="arr"></span></button></div>
  <div class="row"><div class="row-lbl">Focus</div><button class="btn primary focus-ring">Focused state <span class="arr"></span></button></div>
</div>
</body>
</html>
