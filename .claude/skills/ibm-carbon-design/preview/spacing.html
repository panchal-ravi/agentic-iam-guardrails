<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;color:#161616;font-family:var(--cds-font-sans);}
  .card{padding:20px 28px;}
  .row{display:grid;grid-template-columns:88px 1fr 64px;gap:12px;align-items:center;padding:4px 0;}
  .tok{font-family:var(--cds-font-mono);font-size:11px;color:#525252;}
  .bar{height:14px;background:#0f62fe;}
  .val{font-family:var(--cds-font-mono);font-size:11px;color:#6f6f6f;text-align:right;}
</style>
</head>
<body>
<div class="card">
  <div class="row"><div class="tok">spacing-01</div><div class="bar" style="width:2px"></div><div class="val">2px</div></div>
  <div class="row"><div class="tok">spacing-02</div><div class="bar" style="width:4px"></div><div class="val">4px</div></div>
  <div class="row"><div class="tok">spacing-03</div><div class="bar" style="width:8px"></div><div class="val">8px</div></div>
  <div class="row"><div class="tok">spacing-04</div><div class="bar" style="width:12px"></div><div class="val">12px</div></div>
  <div class="row"><div class="tok">spacing-05</div><div class="bar" style="width:16px"></div><div class="val">16px</div></div>
  <div class="row"><div class="tok">spacing-06</div><div class="bar" style="width:24px"></div><div class="val">24px</div></div>
  <div class="row"><div class="tok">spacing-07</div><div class="bar" style="width:32px"></div><div class="val">32px</div></div>
  <div class="row"><div class="tok">spacing-08</div><div class="bar" style="width:40px"></div><div class="val">40px</div></div>
  <div class="row"><div class="tok">spacing-09</div><div class="bar" style="width:48px"></div><div class="val">48px</div></div>
  <div class="row"><div class="tok">spacing-10</div><div class="bar" style="width:64px"></div><div class="val">64px</div></div>
  <div class="row"><div class="tok">spacing-11</div><div class="bar" style="width:80px"></div><div class="val">80px</div></div>
  <div class="row"><div class="tok">spacing-12</div><div class="bar" style="width:96px"></div><div class="val">96px</div></div>
  <div class="row"><div class="tok">spacing-13</div><div class="bar" style="width:160px"></div><div class="val">160px</div></div>
</div>
</body>
</html>
