<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Colors — Core palette</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background:#fff; }
  .card { padding: 20px 24px; font-family: var(--cds-font-sans); }
  .row { display:flex; gap:0; margin-bottom:14px; }
  .row:last-child { margin-bottom: 0; }
  .lbl { width:60px; font-family: var(--cds-font-mono); font-size:11px; color:var(--cds-text-secondary); align-self:flex-start; padding-top:2px; }
  .swatches { display:flex; flex: 1; gap:2px; }
  .sw { flex:1; height:44px; position:relative; display:flex; align-items:flex-end; padding:4px 6px; font-family:var(--cds-font-mono); font-size:9px; }
  .sw.dark { color:#fff; }
  .sw.light { color:#161616; }
  .sw span { opacity:.8; }
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="lbl">Blue</div>
    <div class="swatches">
      <div class="sw light" style="background:#edf5ff"><span>10</span></div>
      <div class="sw light" style="background:#d0e2ff"><span>20</span></div>
      <div class="sw light" style="background:#a6c8ff"><span>30</span></div>
      <div class="sw light" style="background:#78a9ff"><span>40</span></div>
      <div class="sw dark" style="background:#4589ff"><span>50</span></div>
      <div class="sw dark" style="background:#0f62fe"><span>60</span></div>
      <div class="sw dark" style="background:#0043ce"><span>70</span></div>
      <div class="sw dark" style="background:#002d9c"><span>80</span></div>
      <div class="sw dark" style="background:#001d6c"><span>90</span></div>
      <div class="sw dark" style="background:#001141"><span>100</span></div>
    </div>
  </div>
  <div class="row">
    <div class="lbl">Gray</div>
    <div class="swatches">
      <div class="sw light" style="background:#f4f4f4"><span>10</span></div>
      <div class="sw light" style="background:#e0e0e0"><span>20</span></div>
      <div class="sw light" style="background:#c6c6c6"><span>30</span></div>
      <div class="sw light" style="background:#a8a8a8"><span>40</span></div>
      <div class="sw dark" style="background:#8d8d8d"><span>50</span></div>
      <div class="sw dark" style="background:#6f6f6f"><span>60</span></div>
      <div class="sw dark" style="background:#525252"><span>70</span></div>
      <div class="sw dark" style="background:#393939"><span>80</span></div>
      <div class="sw dark" style="background:#262626"><span>90</span></div>
      <div class="sw dark" style="background:#161616"><span>100</span></div>
    </div>
  </div>
  <div class="row">
    <div class="lbl">Red</div>
    <div class="swatches">
      <div class="sw light" style="background:#fff1f1"><span>10</span></div>
      <div class="sw light" style="background:#ffd7d9"><span>20</span></div>
      <div class="sw light" style="background:#ffb3b8"><span>30</span></div>
      <div class="sw light" style="background:#ff8389"><span>40</span></div>
      <div class="sw dark" style="background:#fa4d56"><span>50</span></div>
      <div class="sw dark" style="background:#da1e28"><span>60</span></div>
      <div class="sw dark" style="background:#a2191f"><span>70</span></div>
      <div class="sw dark" style="background:#750e13"><span>80</span></div>
      <div class="sw dark" style="background:#520408"><span>90</span></div>
      <div class="sw dark" style="background:#2d0709"><span>100</span></div>
    </div>
  </div>
</div>
</body>
</html>
